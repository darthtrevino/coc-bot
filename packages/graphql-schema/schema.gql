type Query {
  """
  Gets the user's list of games
  """
  Games: [Game!]!

  """
  Gets the user's list of characters
  """
  Characters: [Character!]!
}

type Game {
  """
  The game's title
  """
  title: String!

  """
  More descriptive details about the game
  """
  description: String!

  """
  Player characters used in this game
  """
  pcs: [Character!]!

  """
  Non-player characters used in this game
  """
  npcs: [Character!]!
}

type Character {
  name: String!
}
